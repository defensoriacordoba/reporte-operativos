<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Defensoría del Pueblo de Córdoba - Reporte de Operativos</title>
    <link rel="shortcut icon" type="image/png" href="https://github.com/defensoriacordoba/reporte-operativos/blob/main/Icono.png?raw=true">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Evita el doble rebote al scrollear en celulares */
            overscroll-behavior-y: none; 
            background-color: #f8fafc;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxixDye71_OYh3Di7CcHH7i7kPsJqUEzYpCBXGp5IU4rYuHQJVJBssugO4GjmUU2M37/exec"
        title="Portal de Gestión"
        allowfullscreen>
    </iframe>
</body>
</html>
